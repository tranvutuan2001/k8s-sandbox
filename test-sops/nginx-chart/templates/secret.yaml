apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nginx-chart.fullname" . }}-secret
  labels:
    {{- include "nginx-chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  # helm-secrets decrypts secrets.yaml before templating, making
  # .Values.nginx_secret_value available as plain text at render time.
  TEST_SECRET: {{ .Values.nginx_secret_value | quote }}
  URL: {{ .Values.url | quote }}
